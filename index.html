<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>rolaGaard</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⚓</text></svg>">
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6219985169853862"
     crossorigin="anonymous"></script>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background:linear-gradient(180deg, #0a0e1a 0%, #111827 100%);
    color:#fff;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    min-height:100vh;
    display:flex; align-items:center; justify-content:center;
    padding:24px;
  }
  .container { text-align:center; max-width:480px; }
  .logo {
    width:64px; height:64px; border-radius:50%;
    display:flex; align-items:center; justify-content:center; font-size:30px;
    background:linear-gradient(135deg, #FFD700 0%, #C9A227 100%);
    margin:0 auto 20px;
  }
  h1 { font-size:28px; font-weight:700; margin-bottom:8px; }
  .subtitle { color:#94a3b8; font-size:14px; margin-bottom:32px; }
  .projects { display:flex; flex-direction:column; gap:12px; }
  .project-card {
    background:#1a1f2e; border:1px solid #2a2f3e; border-radius:12px;
    padding:18px 20px; text-decoration:none; color:#fff;
    display:flex; align-items:center; gap:14px; text-align:left;
    transition:border-color 0.15s, transform 0.1s;
  }
  .project-card:hover { border-color:#FFD700; transform:translateY(-1px); }
  .project-icon { font-size:28px; flex-shrink:0; }
  .project-name { font-size:15px; font-weight:700; }
  .project-desc { font-size:12px; color:#94a3b8; margin-top:2px; }
  .footer { margin-top:36px; font-size:11px; color:#475569; }
</style>
</head>
<body>
  <div class="container">
    <div class="logo">⚓</div>
    <h1>rolaGaard</h1>
    <p class="subtitle">Proyectos personales</p>
    <div class="projects">
      <a class="project-card" href="https://fixture.rolagaard.com">
        <span class="project-icon">⚽</span>
        <div>
          <div class="project-name">Fixture Mundial 2026</div>
          <div class="project-desc">Resultados en vivo, goles y tarjetas en tiempo real</div>
        </div>
      </a>
    </div>
    <div class="footer">&copy; rolaGaard</div>
  </div>
</body>
</html>
